<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="https://sheetdb.io/api/v1/89g0mvc8y072e" method="post"><br>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="data[nomes]" required><br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="data[emails]" required><br><br>

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" name="data[cidades]" required><br><br>

        <label for="tel">Telefone</label>
        <input type="tel" name="data[fones]" id="tel" pattern="[0-9]{2}-[0-9]{9}" required><br><br>

        <label for="idade">Idade</label>
        <input type="number" id="idade" name="data[idades]" required><br><br>

        <label for="cpff">CPF</label>
        <input type="text" id="cpff" name="data[cpf]" required><br><br>

        <input type="date" name="data[datas]" id="data">
        <label for="data">Data</label><br><br>

        <input type="time" name="data[horas]" id="hora">
        <label for="hora">Hora</label> <br><br>

        <input type="week" name="data[semanas]" id="semana">
        <label for="semana">Selecione a semana</label><br><br>

        <input type="month" name="data[mess]" id="mes">
        <label for="mes">Selecione o mês</label><br><br>

        <button type="submit" id="dados">Enviar dados</button>
    </form>
    <script src="scipt.js"></script>
</body>
</html>
